<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Nora — Voice Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #eee;
      font-family: -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 1280px;
      height: 720px;
      overflow: hidden;
    }
    .container {
      text-align: center;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #7c3aed;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      transition: box-shadow 0.3s ease;
    }
    .avatar.speaking {
      box-shadow: 0 0 0 8px rgba(124, 58, 237, 0.3), 0 0 0 16px rgba(124, 58, 237, 0.15);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .avatar.listening {
      box-shadow: 0 0 0 8px rgba(110, 231, 183, 0.3), 0 0 0 16px rgba(110, 231, 183, 0.15);
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 8px rgba(124, 58, 237, 0.3), 0 0 0 16px rgba(124, 58, 237, 0.15); }
      50% { box-shadow: 0 0 0 12px rgba(124, 58, 237, 0.4), 0 0 0 24px rgba(124, 58, 237, 0.2); }
    }
    .name { font-size: 28px; font-weight: 600; margin-bottom: 4px; }
    .role { font-size: 14px; color: #888; margin-bottom: 16px; }
    .status { font-size: 13px; color: #666; }
    .status.connected { color: #6ee7b7; }
    .status.error { color: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <div id="avatar" class="avatar">N</div>
    <div class="name">Nora</div>
    <div class="role">PM Agent — LimeLight Marketing</div>
    <div id="status" class="status">Connecting...</div>
  </div>

  <script>
    // Parse config from URL params
    const params = new URLSearchParams(window.location.search);
    const WS_URL = params.get('wss');
    const SERVER_URL = params.get('server');
    const SESSION_TOKEN = params.get('token');

    // bot_id is received from the relay after connection (avoids race condition)
    let BOT_ID = null;
    let isMuted = false;

    const statusEl = document.getElementById('status');
    const avatarEl = document.getElementById('avatar');

    // Separate contexts: playback can be interrupted without killing capture
    let playbackCtx = null;
    let ws = null;
    let isSpeaking = false;
    let scheduledEndTime = 0;

    // ---- Audio Playback ----
    function getPlaybackCtx() {
      if (!playbackCtx || playbackCtx.state === 'closed') {
        playbackCtx = new AudioContext({ sampleRate: 24000 });
      }
      return playbackCtx;
    }

    function playAudioChunk(base64Audio) {
      const ctx = getPlaybackCtx();
      if (!base64Audio) return;

      const raw = atob(base64Audio);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);

      const int16 = new Int16Array(bytes.buffer);
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

      const buffer = ctx.createBuffer(1, float32.length, 24000);
      buffer.getChannelData(0).set(float32);

      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.connect(ctx.destination);

      const now = ctx.currentTime;
      const startTime = Math.max(now, scheduledEndTime);
      source.start(startTime);
      scheduledEndTime = startTime + buffer.duration;

      if (!isSpeaking) {
        isSpeaking = true;
        avatarEl.classList.add('speaking');
        avatarEl.classList.remove('listening');
      }

      source.onended = () => {
        if (ctx.currentTime >= scheduledEndTime - 0.05) {
          isSpeaking = false;
          avatarEl.classList.remove('speaking');
          avatarEl.classList.add('listening');
        }
      };
    }

    function interruptAudio() {
      // Stop all scheduled playback by closing + recreating the playback context
      // This does NOT affect mic capture (separate pipeline)
      scheduledEndTime = 0;
      isSpeaking = false;
      avatarEl.classList.remove('speaking');
      avatarEl.classList.add('listening');
      if (playbackCtx && playbackCtx.state !== 'closed') {
        playbackCtx.close().catch(() => {});
        playbackCtx = null;
      }
    }

    // ---- Microphone Capture ----
    // Uses AudioContext at 24kHz so the browser handles resampling natively (high quality).
    // AudioWorklet (primary) or ScriptProcessor (fallback) for processing.
    async function startMicCapture() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const track = stream.getAudioTracks()[0];
        console.log('🎤 Got audio track:', track.label, 'settings:', JSON.stringify(track.getSettings()));

        // Create AudioContext at 24kHz — browser's built-in resampler handles conversion
        const captureCtx = new AudioContext({ sampleRate: 24000 });
        await captureCtx.resume();
        console.log('🎤 Capture AudioContext sample rate:', captureCtx.sampleRate, 'state:', captureCtx.state);

        const source = captureCtx.createMediaStreamSource(stream);

        // Try AudioWorklet first (modern, matches reference impl), fall back to ScriptProcessor
        try {
          await setupAudioWorklet(captureCtx, source);
          console.log('🎤 Using AudioWorklet at 24kHz');
        } catch (err) {
          console.log('🎤 AudioWorklet failed, using ScriptProcessor:', err.message);
          setupScriptProcessor(captureCtx, source);
        }

        avatarEl.classList.add('listening');
        statusEl.textContent = 'Connected — Listening';
        statusEl.className = 'status connected';
      } catch (err) {
        console.error('Mic capture error:', err);
        statusEl.textContent = 'Microphone error: ' + err.message;
        statusEl.className = 'status error';
      }
    }

    async function setupAudioWorklet(ctx, source) {
      const workletCode = `
        class NoraCaptureProcessor extends AudioWorkletProcessor {
          constructor() {
            super();
            this.foundAudio = false;
          }
          process(inputs) {
            const input = inputs[0];
            if (input && input[0] && input[0].length > 0) {
              // Skip leading silence to avoid latency at stream start
              if (!this.foundAudio) {
                for (const sample of input[0]) {
                  if (sample !== 0) { this.foundAudio = true; break; }
                }
                if (!this.foundAudio) return true;
              }
              // Send a copy of the Float32 mono samples to main thread
              this.port.postMessage({ samples: input[0].slice() });
            }
            return true;
          }
        }
        registerProcessor('nora-capture', NoraCaptureProcessor);
      `;
      const blob = new Blob([workletCode], { type: 'application/javascript' });
      const url = URL.createObjectURL(blob);
      await ctx.audioWorklet.addModule(url);
      URL.revokeObjectURL(url);

      const workletNode = new AudioWorkletNode(ctx, 'nora-capture');
      workletNode.port.onmessage = (e) => {
        const float32 = e.data.samples;
        // Convert Float32 [-1,1] → Int16 PCM (already at 24kHz from AudioContext)
        const pcm16 = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) {
          const s = Math.max(-1, Math.min(1, float32[i]));
          pcm16[i] = s < 0 ? Math.floor(s * 32768) : Math.floor(s * 32767);
        }
        sendAudioToRelay(pcm16);
      };

      source.connect(workletNode);
      // Connect to destination to keep the audio graph alive
      workletNode.connect(ctx.destination);
    }

    function setupScriptProcessor(ctx, source) {
      const processor = ctx.createScriptProcessor(4096, 1, 1);
      processor.onaudioprocess = (e) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const float32 = e.inputBuffer.getChannelData(0);
        // Already at 24kHz from AudioContext — just convert to Int16 PCM
        const pcm16 = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) {
          const s = Math.max(-1, Math.min(1, float32[i]));
          pcm16[i] = s < 0 ? Math.floor(s * 32768) : Math.floor(s * 32767);
        }
        sendAudioToRelay(pcm16);
      };
      source.connect(processor);
      processor.connect(ctx.destination);
    }

    // ---- Audio Send Buffer ----
    // Buffer small PCM16 chunks and send in batches of ~4800 samples (200ms at 24kHz)
    const SEND_BUFFER_SIZE = 4800; // samples (200ms at 24kHz)
    let sendBuffer = new Int16Array(SEND_BUFFER_SIZE);
    let sendBufferOffset = 0;
    let totalSentChunks = 0;

    function sendAudioToRelay(pcm16) {
      let srcOffset = 0;
      while (srcOffset < pcm16.length) {
        const remaining = SEND_BUFFER_SIZE - sendBufferOffset;
        const toCopy = Math.min(remaining, pcm16.length - srcOffset);
        sendBuffer.set(pcm16.subarray(srcOffset, srcOffset + toCopy), sendBufferOffset);
        sendBufferOffset += toCopy;
        srcOffset += toCopy;

        if (sendBufferOffset >= SEND_BUFFER_SIZE) {
          flushSendBuffer();
        }
      }
    }

    // Flush whatever is in the buffer — called on a timer to avoid stale audio
    function flushSendBuffer() {
      if (sendBufferOffset === 0) return;
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        sendBufferOffset = 0;
        return;
      }

      const toSend = sendBuffer.slice(0, sendBufferOffset);
      sendBufferOffset = 0;

      const bytes = new Uint8Array(toSend.buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      const b64 = btoa(binary);

      ws.send(JSON.stringify({
        type: 'input_audio_buffer.append',
        audio: b64
      }));

      totalSentChunks++;
      if (totalSentChunks === 1 || totalSentChunks % 50 === 0) {
        console.log(`🎤 Sent chunk #${totalSentChunks}, ~${b64.length} base64 chars (${toSend.length} samples)`);
      }
    }

    // Flush timer — ensures partial buffers get sent within 200ms
    setInterval(flushSendBuffer, 200);

    // ---- WebSocket relay to OpenAI ----
    function connectRelay() {
      if (!WS_URL) {
        statusEl.textContent = 'Error: Missing wss parameter';
        statusEl.className = 'status error';
        return;
      }

      statusEl.textContent = 'Connecting to Nora...';

      let url = WS_URL;
      const relayParams = new URLSearchParams();
      if (SESSION_TOKEN) relayParams.set('token', SESSION_TOKEN);
      const qs = relayParams.toString();
      if (qs) url += (url.includes('?') ? '&' : '?') + qs;

      ws = new WebSocket(url);

      ws.onopen = async () => {
        console.log('✅ Relay WebSocket connected');
        statusEl.textContent = 'Connected — Starting mic...';
        statusEl.className = 'status connected';
        await startMicCapture();
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);

          // Receive bot_id from relay after auth
          if (msg.type === 'nora.session') {
            BOT_ID = msg.bot_id;
            console.log('🤖 Bot ID received:', BOT_ID);
            return;
          }

          // Handle audio delta from OpenAI Realtime
          if (msg.type === 'response.audio.delta') {
            if (!isMuted) playAudioChunk(msg.delta);
          }

          // Handle mute toggle from server
          if (msg.type === 'nora.mute') {
            isMuted = msg.muted;
            console.log(`🔇 Mute ${isMuted ? 'enabled' : 'disabled'}`);
            if (isMuted) {
              interruptAudio();
              statusEl.textContent = 'Connected — Muted (listening only)';
            } else {
              statusEl.textContent = 'Connected — Listening';
            }
          }

          // Handle interruption — user started speaking
          if (msg.type === 'input_audio_buffer.speech_started') {
            interruptAudio();
          }

          // Handle errors
          if (msg.type === 'error') {
            console.error('OpenAI error:', msg.error);
            statusEl.textContent = 'Error: ' + (msg.error?.message || 'Unknown');
            statusEl.className = 'status error';
          }

          // Session events
          if (msg.type === 'session.created') {
            console.log('🧠 OpenAI session created');
          }
          if (msg.type === 'session.updated') {
            console.log('🧠 OpenAI session updated');
          }

          // Response completed — extract tasks/memory
          if (msg.type === 'response.done' && msg.response) {
            const outputItems = msg.response.output || [];
            for (const item of outputItems) {
              if (item.type === 'message' && item.role === 'assistant') {
                const transcript = item.content?.find(c => c.type === 'audio')?.transcript;
                if (transcript && SERVER_URL) {
                  fetch(`${SERVER_URL}/voice-agent/response`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      text: transcript,
                      token: SESSION_TOKEN
                    })
                  }).catch(() => {});
                }
              }
            }
          }

        } catch (err) {
          console.error('WS message error:', err);
        }
      };

      ws.onclose = () => {
        console.log('WebSocket closed');
        statusEl.textContent = 'Disconnected — Reconnecting...';
        statusEl.className = 'status';
        setTimeout(connectRelay, 3000);
      };

      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
        statusEl.textContent = 'Connection error';
        statusEl.className = 'status error';
      };
    }

    // ---- Boot ----
    connectRelay();
  </script>
</body>
</html>
