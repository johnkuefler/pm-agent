<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Nora — Voice Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #eee;
      font-family: -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 1280px;
      height: 720px;
      overflow: hidden;
    }
    .container {
      text-align: center;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #7c3aed;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      transition: box-shadow 0.3s ease;
    }
    .avatar.speaking {
      box-shadow: 0 0 0 8px rgba(124, 58, 237, 0.3), 0 0 0 16px rgba(124, 58, 237, 0.15);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .avatar.listening {
      box-shadow: 0 0 0 8px rgba(110, 231, 183, 0.3), 0 0 0 16px rgba(110, 231, 183, 0.15);
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 8px rgba(124, 58, 237, 0.3), 0 0 0 16px rgba(124, 58, 237, 0.15); }
      50% { box-shadow: 0 0 0 12px rgba(124, 58, 237, 0.4), 0 0 0 24px rgba(124, 58, 237, 0.2); }
    }
    .name { font-size: 28px; font-weight: 600; margin-bottom: 4px; }
    .role { font-size: 14px; color: #888; margin-bottom: 16px; }
    .status { font-size: 13px; color: #666; }
    .status.connected { color: #6ee7b7; }
    .status.error { color: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <div id="avatar" class="avatar">N</div>
    <div class="name">Nora</div>
    <div class="role">PM Agent — LimeLight Marketing</div>
    <div id="status" class="status">Connecting...</div>
  </div>

  <script>
    // Parse config from URL params
    const params = new URLSearchParams(window.location.search);
    const WS_URL = params.get('wss');
    const SERVER_URL = params.get('server');
    const SESSION_TOKEN = params.get('token');

    // bot_id is received from the relay after connection (avoids race condition)
    let BOT_ID = null;

    const statusEl = document.getElementById('status');
    const avatarEl = document.getElementById('avatar');

    // Separate contexts: playback can be interrupted without killing capture
    let playbackCtx = null;
    let ws = null;
    let isSpeaking = false;
    let scheduledEndTime = 0;

    // ---- Audio Playback ----
    function getPlaybackCtx() {
      if (!playbackCtx || playbackCtx.state === 'closed') {
        playbackCtx = new AudioContext({ sampleRate: 24000 });
      }
      return playbackCtx;
    }

    function playAudioChunk(base64Audio) {
      const ctx = getPlaybackCtx();
      if (!base64Audio) return;

      const raw = atob(base64Audio);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);

      const int16 = new Int16Array(bytes.buffer);
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

      const buffer = ctx.createBuffer(1, float32.length, 24000);
      buffer.getChannelData(0).set(float32);

      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.connect(ctx.destination);

      const now = ctx.currentTime;
      const startTime = Math.max(now, scheduledEndTime);
      source.start(startTime);
      scheduledEndTime = startTime + buffer.duration;

      if (!isSpeaking) {
        isSpeaking = true;
        avatarEl.classList.add('speaking');
        avatarEl.classList.remove('listening');
      }

      source.onended = () => {
        if (ctx.currentTime >= scheduledEndTime - 0.05) {
          isSpeaking = false;
          avatarEl.classList.remove('speaking');
          avatarEl.classList.add('listening');
        }
      };
    }

    function interruptAudio() {
      // Stop all scheduled playback by closing + recreating the playback context
      // This does NOT affect mic capture (separate pipeline)
      scheduledEndTime = 0;
      isSpeaking = false;
      avatarEl.classList.remove('speaking');
      avatarEl.classList.add('listening');
      if (playbackCtx && playbackCtx.state !== 'closed') {
        playbackCtx.close().catch(() => {});
        playbackCtx = null;
      }
    }

    // ---- Microphone Capture ----
    // Uses MediaStreamTrackProcessor (recommended by Recall docs) with ScriptProcessor fallback
    async function startMicCapture() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const track = stream.getAudioTracks()[0];
        console.log('🎤 Got audio track:', track.label, 'settings:', JSON.stringify(track.getSettings()));

        // Try MediaStreamTrackProcessor first (recommended by Recall)
        if (typeof MediaStreamTrackProcessor !== 'undefined') {
          console.log('🎤 Using MediaStreamTrackProcessor');
          await captureWithTrackProcessor(track);
        } else {
          console.log('🎤 Falling back to ScriptProcessor');
          await captureWithScriptProcessor(stream);
        }

        avatarEl.classList.add('listening');
        statusEl.textContent = 'Connected — Listening';
        statusEl.className = 'status connected';
      } catch (err) {
        console.error('Mic capture error:', err);
        statusEl.textContent = 'Microphone error: ' + err.message;
        statusEl.className = 'status error';
      }
    }

    async function captureWithTrackProcessor(track) {
      const processor = new MediaStreamTrackProcessor({ track });
      const reader = processor.readable.getReader();
      const sourceSampleRate = track.getSettings().sampleRate || 48000;
      console.log('🎤 Source sample rate:', sourceSampleRate);

      let chunkCount = 0;

      const processAudio = async () => {
        while (true) {
          const { value: audioData, done } = await reader.read();
          if (done) break;
          if (!ws || ws.readyState !== WebSocket.OPEN) {
            audioData.close();
            continue;
          }

          try {
            const numberOfFrames = audioData.numberOfFrames;
            const format = audioData.format; // e.g. 'f32-planar', 'f32', 's16-planar', 's16'

            let float32;
            if (format === 'f32-planar' || format === 'f32') {
              float32 = new Float32Array(numberOfFrames);
              audioData.copyTo(float32, { planeIndex: 0 });
            } else if (format === 's16-planar' || format === 's16') {
              const int16 = new Int16Array(numberOfFrames);
              audioData.copyTo(int16, { planeIndex: 0 });
              float32 = new Float32Array(numberOfFrames);
              for (let i = 0; i < numberOfFrames; i++) float32[i] = int16[i] / 32768;
            } else {
              // Fallback: try f32
              float32 = new Float32Array(numberOfFrames);
              audioData.copyTo(float32, { planeIndex: 0 });
            }
            audioData.close();

            if (chunkCount === 0) {
              console.log('🎤 First audio chunk — format:', format, 'frames:', numberOfFrames);
            }

            // Resample to 24000 Hz
            const ratio = 24000 / sourceSampleRate;
            const outputLength = Math.floor(numberOfFrames * ratio);
            const pcm16 = new Int16Array(outputLength);

            for (let i = 0; i < outputLength; i++) {
              const srcIdx = i / ratio;
              const idx = Math.floor(srcIdx);
              const frac = srcIdx - idx;
              const s0 = float32[idx] || 0;
              const s1 = float32[Math.min(idx + 1, numberOfFrames - 1)] || 0;
              const sample = s0 + frac * (s1 - s0);
              pcm16[i] = Math.max(-32768, Math.min(32767, Math.floor(sample * 32767)));
            }

            sendAudioToRelay(pcm16);

            chunkCount++;
            if (chunkCount % 100 === 0) {
              console.log(`🎤 Sent ${chunkCount} audio chunks`);
            }
          } catch (err) {
            console.error('Audio processing error:', err);
          }
        }
      };

      processAudio().catch(err => console.error('Track processor loop error:', err));
    }

    async function captureWithScriptProcessor(stream) {
      // Create a dedicated capture context at native sample rate
      const captureCtx = new AudioContext();
      await captureCtx.resume();
      console.log('🎤 Capture AudioContext sample rate:', captureCtx.sampleRate, 'state:', captureCtx.state);

      const source = captureCtx.createMediaStreamSource(stream);
      const processor = captureCtx.createScriptProcessor(4096, 1, 1);

      let chunkCount = 0;

      processor.onaudioprocess = (e) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;

        const inputData = e.inputBuffer.getChannelData(0);

        // Resample to 24000 Hz
        const ratio = 24000 / captureCtx.sampleRate;
        const outputLength = Math.floor(inputData.length * ratio);
        const pcm16 = new Int16Array(outputLength);

        for (let i = 0; i < outputLength; i++) {
          const srcIdx = i / ratio;
          const idx = Math.floor(srcIdx);
          const frac = srcIdx - idx;
          const s0 = inputData[idx] || 0;
          const s1 = inputData[Math.min(idx + 1, inputData.length - 1)] || 0;
          const sample = s0 + frac * (s1 - s0);
          pcm16[i] = Math.max(-32768, Math.min(32767, Math.floor(sample * 32767)));
        }

        sendAudioToRelay(pcm16);

        chunkCount++;
        if (chunkCount % 100 === 0) {
          console.log(`🎤 Sent ${chunkCount} audio chunks`);
        }
      };

      source.connect(processor);
      processor.connect(captureCtx.destination);
    }

    function sendAudioToRelay(pcm16) {
      const bytes = new Uint8Array(pcm16.buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      const b64 = btoa(binary);

      ws.send(JSON.stringify({
        type: 'input_audio_buffer.append',
        audio: b64
      }));
    }

    // ---- Transcript relay to server (for persistence) ----
    function connectTranscriptWs() {
      try {
        const transcriptWs = new WebSocket('wss://meeting-data.bot.recall.ai/api/v1/transcript');
        transcriptWs.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (SERVER_URL && BOT_ID) {
              fetch(`${SERVER_URL}/webhook/transcript-relay`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bot_id: BOT_ID, data })
              }).catch(() => {});
            }
          } catch (err) {
            console.error('Transcript parse error:', err);
          }
        };
        transcriptWs.onopen = () => console.log('📝 Transcript WebSocket connected');
        transcriptWs.onclose = () => {
          console.log('📝 Transcript WebSocket disconnected, reconnecting...');
          setTimeout(connectTranscriptWs, 3000);
        };
      } catch (err) {
        console.error('Transcript WS error:', err);
      }
    }

    // ---- WebSocket relay to OpenAI ----
    function connectRelay() {
      if (!WS_URL) {
        statusEl.textContent = 'Error: Missing wss parameter';
        statusEl.className = 'status error';
        return;
      }

      statusEl.textContent = 'Connecting to Nora...';

      let url = WS_URL;
      const relayParams = new URLSearchParams();
      if (SESSION_TOKEN) relayParams.set('token', SESSION_TOKEN);
      const qs = relayParams.toString();
      if (qs) url += (url.includes('?') ? '&' : '?') + qs;

      ws = new WebSocket(url);

      ws.onopen = async () => {
        console.log('✅ Relay WebSocket connected');
        statusEl.textContent = 'Connected — Starting mic...';
        statusEl.className = 'status connected';
        await startMicCapture();
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);

          // Receive bot_id from relay after auth
          if (msg.type === 'nora.session') {
            BOT_ID = msg.bot_id;
            console.log('🤖 Bot ID received:', BOT_ID);
            return;
          }

          // Handle audio delta from OpenAI Realtime
          if (msg.type === 'response.audio.delta') {
            playAudioChunk(msg.delta);
          }

          // Handle interruption — user started speaking
          if (msg.type === 'input_audio_buffer.speech_started') {
            interruptAudio();
          }

          // Handle errors
          if (msg.type === 'error') {
            console.error('OpenAI error:', msg.error);
            statusEl.textContent = 'Error: ' + (msg.error?.message || 'Unknown');
            statusEl.className = 'status error';
          }

          // Session events
          if (msg.type === 'session.created') {
            console.log('🧠 OpenAI session created');
          }
          if (msg.type === 'session.updated') {
            console.log('🧠 OpenAI session updated');
          }

          // Response completed — extract tasks/memory
          if (msg.type === 'response.done' && msg.response) {
            const outputItems = msg.response.output || [];
            for (const item of outputItems) {
              if (item.type === 'message' && item.role === 'assistant') {
                const transcript = item.content?.find(c => c.type === 'audio')?.transcript;
                if (transcript && SERVER_URL) {
                  fetch(`${SERVER_URL}/voice-agent/response`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      text: transcript,
                      token: SESSION_TOKEN
                    })
                  }).catch(() => {});
                }
              }
            }
          }

        } catch (err) {
          console.error('WS message error:', err);
        }
      };

      ws.onclose = () => {
        console.log('WebSocket closed');
        statusEl.textContent = 'Disconnected — Reconnecting...';
        statusEl.className = 'status';
        setTimeout(connectRelay, 3000);
      };

      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
        statusEl.textContent = 'Connection error';
        statusEl.className = 'status error';
      };
    }

    // ---- Boot ----
    connectRelay();
    connectTranscriptWs();
  </script>
</body>
</html>
